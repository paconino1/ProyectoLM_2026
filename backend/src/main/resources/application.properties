# ============================================
# CONFIGURACIÓN DE SPRING BOOT
# ============================================

# Nombre de la aplicación
spring.application.name=eneba-clone

# ============================================
# PUERTO Y SERVIDOR
# ============================================
server.port=8080
server.servlet.context-path=/api

# ============================================
# BASE DE DATOS (MySQL)
# ============================================
# Variables por defecto para desarrollo local
# Con Docker: se sobrescriben por docker-compose
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eneba_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:PXLQSQ}

# Driver para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA y HIBERNATE
# ============================================
# Crear/actualizar las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en console (útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.eneba=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# CORS Y SEGURIDAD
# ============================================
# Permitir peticiones desde el frontend
app.cors.allowedOrigins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080

# ============================================
# JWT
# ============================================
# Cambiar esto por una clave segura en producción
app.jwt.secret=tu-clave-secreta-super-segura-cambiar-en-produccion-minimo-256-caracteres
app.jwt.expiration=86400000

# ============================================
# PERFIL DE DESARROLLO
# ============================================
spring.profiles.active=dev
