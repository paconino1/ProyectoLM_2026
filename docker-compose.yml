version: '3.8'

services:
  # Base de Datos MySQL
  mysql:
    image: mysql:8.0
    container_name: eneba_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eneba_db
      MYSQL_USER: eneba_user
      MYSQL_PASSWORD: eneba_password
    ports:
      - "3306:3306"
    volumes:
      # Guardar datos en una carpeta local
      - mysql_data:/var/lib/mysql
    networks:
      - eneba_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eneba_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/eneba_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - eneba_network
    environment:
      JAVA_OPTS: "-Xmx512m -Xmx512m"

volumes:
  mysql_data:

networks:
  eneba_network:
    driver: bridge
